spring.application.name=safebanking

# -----------------------------------------------------------------------
# DataSource (PostgreSQL)
# -----------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/safebanking_db
spring.datasource.username=admin
spring.datasource.password=secretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------------------------------------------
# JWT configuration
# -----------------------------------------------------------------------
# Secret used to sign tokens.  Must be at least 32 characters (256 bits).
# In production override this via the environment variable:
#   JWT_SECRET=<your-long-random-secret>
jwt.secret=${JWT_SECRET:change-this-secret-before-going-to-production}

# Token lifetime: 24 hours in milliseconds.
# Override via environment variable: JWT_EXPIRATION_MS=<millis>
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
