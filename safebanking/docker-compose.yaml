# To forward Stripe webhook events to the local app during development, run:
#   stripe listen --forward-to localhost:8080/api/payments/webhook
# Requires the Stripe CLI: https://stripe.com/docs/stripe-cli
services:
  db:
    image: postgres:15-alpine
    container_name: safebanking-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: safebanking_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
