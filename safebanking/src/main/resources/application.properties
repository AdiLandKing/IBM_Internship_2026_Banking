spring.application.name=safebanking

# -----------------------------------------------------------------------
# JWT configuration
# -----------------------------------------------------------------------
# Secret used to sign tokens.  Must be at least 32 characters (256 bits).
# In production override this via the environment variable:
#   JWT_SECRET=<your-long-random-secret>
jwt.secret=${JWT_SECRET:change-this-secret-before-going-to-production}

# Token lifetime: 24 hours in milliseconds.
# Override via environment variable: JWT_EXPIRATION_MS=<millis>
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
