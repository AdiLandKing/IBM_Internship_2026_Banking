spring.application.name=safebanking

# Database connection using Environment Variables
spring.datasource.url=jdbc:postgresql://localhost:5433/safebanking_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate ORM configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# SQL Logging (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${APP_JWT_SECRET:dev-only-jwt-secret-change-me-at-least-32-chars}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.first-name=${APP_ADMIN_FIRST_NAME:Admin}
app.admin.last-name=${APP_ADMIN_LAST_NAME:User}

# Stripe — use test-mode keys during development (no real money moves)
# Test card: 4242 4242 4242 4242, any future expiry, any CVC
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
# FX / Exchange-rate — Frankfurter (https://api.frankfurter.dev)
#   base-url: current Frankfurter API root; configurable in case the provider moves again
#   cache-ttl-seconds: how long a fetched rate is reused before a live re-fetch (default 5 min)
#   connect-timeout-seconds: TCP connect timeout to Frankfurter (default 5 s)
#   read-timeout-seconds: HTTP read timeout waiting for Frankfurter response (default 5 s)
#   If Frankfurter is unreachable the transfer returns 503 Service Unavailable.
app.fx.base-url=${APP_FX_BASE_URL:https://api.frankfurter.dev/v1}
app.fx.cache-ttl-seconds=${APP_FX_CACHE_TTL_SECONDS:300}
app.fx.connect-timeout-seconds=${APP_FX_CONNECT_TIMEOUT_SECONDS:5}
app.fx.read-timeout-seconds=${APP_FX_READ_TIMEOUT_SECONDS:5}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
