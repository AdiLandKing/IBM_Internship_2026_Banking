spring.application.name=safebanking

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/safebanking_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secretpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${APP_JWT_SECRET:dev-only-jwt-secret-change-me-at-least-32-chars}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.first-name=${APP_ADMIN_FIRST_NAME:Admin}
app.admin.last-name=${APP_ADMIN_LAST_NAME:User}
