spring.application.name=safebanking-test

spring.datasource.url=jdbc:h2:mem:safebanking_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.jwt.secret=test-secret-key-with-at-least-32-characters
app.jwt.expiration-seconds=3600
app.epin.encryption-key=test-epin-encryption-key-at-least-32-characters

# Disable admin seeder in tests
app.admin.email=
app.admin.password=
